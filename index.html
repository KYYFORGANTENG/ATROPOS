<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Link Sosmed Gue</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
body {
  margin: 0;
  height: 100vh;
  overflow: hidden;
  font-family: Arial;
  color: white;
  background: url("https://images.unsplash.com/photo-1541562232579-512a21360020") center/cover no-repeat;
}

/* overlay */
.overlay {
  position: absolute;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.65);
  backdrop-filter: blur(3px);
}

/* container */
.container {
  position: relative;
  text-align: center;
  width: 90%;
  max-width: 400px;
  margin: auto;
  top: 50%;
  transform: translateY(-50%);
}

/* profile */
.profile {
  width: 110px;
  height: 110px;
  border-radius: 50%;
  margin: auto;
  border: 3px solid white;

  /* 🔥 EDIT FOTO PROFIL DI SINI */
  background: url("https://ibb.co.com/RJNhPn1") center/cover;
}

/* text */
h1 { margin-top: 10px; }
p { opacity: 0.8; margin-bottom: 15px; }

/* button */
.btn {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;

  margin: 10px 0;
  padding: 12px;
  background: rgba(255,255,255,0.1);
  border: 1px solid rgba(255,255,255,0.2);
  border-radius: 12px;
  color: white;
  text-decoration: none;
  transition: 0.3s;
  cursor: pointer;
}

.btn:hover {
  transform: scale(1.05);
  background: rgba(255,255,255,0.25);
}
</style>
</head>

<body>

<div class="overlay"></div>

<!-- 🎧 MUSIC -->
<audio id="bgmusic" loop>
  <source src="https://cdn.pixabay.com/download/audio/2022/10/30/audio_d0a3b1b5c7.mp3?filename=lofi-study-112191.mp3">
</audio>

<!-- 🔊 CLICK SOUND -->
<audio id="clicksound">
  <source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_c8c8a1c9b7.mp3?filename=click-124467.mp3">
</audio>

<div class="container">

  <div class="profile"></div>

  <!-- 🔥 EDIT NAMA -->
  <h1>ATROPOS MC</h1>

  <!-- 🔥 EDIT BIO -->
  <p>Follow sosial media gw</p>

  <!-- 🎧 MUSIC BUTTON -->
  <div class="btn" onclick="toggleMusic()">
    🎧 Play / Pause Musik
  </div>

  <!-- 🔥 EDIT LINK SOSMED DI SINI -->

  <a class="btn" href="https://instagram.com/nataa.nbee" target="_blank">
    <i class="fa-brands fa-instagram"></i> Instagram
  </a>

  <a class="btn" href="https://tiktok.com/@ntncpy" target="_blank">
    <i class="fa-brands fa-tiktok"></i> TikTok
  </a>

  <a class="btn" href="https://youtube.com/@atroposchannel" target="_blank">
    <i class="fa-brands fa-youtube"></i> YouTube
  </a>

  <a class="btn" href="https://github.com/Atropos" target="_blank">
    <i class="fa-brands fa-github"></i> GitHub
  </a>

</div>

<script>

let music = document.getElementById("bgmusic");
let click = document.getElementById("clicksound");

/* 🎧 MUSIC CONTROL */
function toggleMusic() {
  if (music.paused) {
    music.volume = 0.5;
    music.play();
  } else {
    music.pause();
  }
}

/* 🔊 CLICK SOUND */
document.querySelectorAll(".btn").forEach(btn => {
  btn.addEventListener("click", () => {
    click.currentTime = 0;
    click.play();
  });
});

</script>

</body>
</html>
